<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Резерв+ Интерфейс</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="МойСайт">
    <link rel="icon" href="img/favicon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

<div class="app-container">

    <div class="notification-container">
        <button class="notification-btn">
            Сповіщення
            <span class="bell-icon">
            <img src="img/bell-icon.png" class="bell">
            </span>
        </button>
    </div>

    <main class="content-area">
        <div class="id-card">

            <div class="card-header">
                <div class="card-title-container">
                    <h1 class="card-title">Резерв ID</h1>
                </div>
                <div class="coat-of-arms-container">
                    <img src="img/gerb.png" alt="Герб України" class="tryzub-logo">

                </div>
            </div>

            <div class="data-block">
                <div class="data-item">
                    <p class="data-label">Дата народження:</p>
                    <p class="data-value">13.02.1995</p>
                </div>
                <div class="data-item">
                    <p class="data-label">Відстрочка до:</p>
                    <p class="data-value">03.05.2026</p>
                </div>
            </div>

            <div class="update-status-bar">
                <div class="marquee-wrapper" id="marquee-container">
                    <div class="marquee-content">
                        <span class="update-text"></span>
                    </div>
                </div>
            </div>

            <div class="card-footer">
                <div class="user-info">
                    <p class="user-status">Військовозобов'язаний</p>
                    <p class="user-name">ПОСОБІЛОВ<br>Богдан<br>Романович</p>
                </div>
                <button class="add-btn"><span>+</span></button>
            </div>

        </div>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
<!--            <div class="nav-icon icon-id"></div>-->
            <div class="nav-icon">
<!--                          <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">-->
<!--                &lt;!&ndash; Background &ndash;&gt;-->
<!--                <rect x="8" y="4" width="48" height="56" rx="6" fill="black"/>-->

<!--                              &lt;!&ndash; White lines &ndash;&gt;-->
<!--                <rect x="10%" y="38" width="80%" height="5" fill="white"/>-->
<!--                <rect x="10%" y="46" width="80%" height="5" fill="white"/>-->
<!--            </svg>-->
                <img src="img/logo/reserv.png" width="64" />
            </div>

            <div class="nav-label">Резерв ID</div>
        </a>
        <a href="#" class="nav-item">
            <div class="nav-icon">
                <img src="img/logo/service.png" width="28" />
            </div>
            <div class="nav-label">Сервіси</div>
        </a>
        <a href="#" class="nav-item">
            <div class="nav-icon">
                <img src="img/logo/vacancies.png" width="28" />
            </div>
<!--            <div class="nav-icon icon-vacancies"></div>-->

            <div class="nav-label">Вакансії</div>
        </a>
        <a href="#" class="nav-item">
            <div class="nav-icon">
                <img src="img/logo/menu.png" width="28" />
            </div>
<!--            <div class="nav-icon icon-menu"></div>-->

            <div class="nav-label">Меню</div>
        </a>
        <div class="ios-home-bar"></div>
    </nav>

</div>
<script src="script.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
</script>

</html>
